name: Ingest ESPN rosters

# Recurring ESPN roster ingestion. Wraps `npm run ingest:espn` (see docs/espn.md)
# on a weekly schedule, plus a manual trigger. STRICT=1 so a partial run turns the
# workflow red instead of silently going green with half-stale data.

on:
  schedule:
    # Wednesday 12:00 UTC (07:00 ET) — after Tue/Wed waiver + practice-squad settling.
    - cron: '0 12 * * 3'
  workflow_dispatch: {}

# Never let two ingestions overlap (a slow run + the next schedule, or a manual
# dispatch during a scheduled one).
concurrency:
  group: ingest-espn
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run ingest:espn
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRICT: '1'
